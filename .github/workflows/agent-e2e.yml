name: Agent E2E

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'backend/**'
      - '.github/workflows/agent-e2e.yml'
  pull_request:
    paths:
      - 'agent/**'
      - 'backend/**'
      - '.github/workflows/agent-e2e.yml'

concurrency:
  group: agent-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # Windows runner: the agent is WinUI 3 / Windows-only, and the e2e suite
    # launches the real agent exe + drives a real backend over loopback. The
    # runner has a desktop session, which the agent's WinUI bootstrap needs.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The e2e harness launches this exact exe (x64 Debug). Build it first so
      # the suite isn't launching a stale or missing binary.
      - name: Build agent (x64)
        run: dotnet build agent/src/FocusAgent.App/FocusAgent.App.csproj -p:Platform=x64 -c Debug

      # The agent had no CI at all before #131 — run its unit/native suites here
      # too, on the same Windows runner that already has to build the agent.
      - name: Agent unit tests
        run: dotnet test agent/FocusAgent.sln -c Debug

      # Warm the backend build so the harness's 180s readiness window isn't spent
      # on a cold restore+build when it `dotnet run`s the backend.
      - name: Build backend
        run: dotnet build backend/Anchor.sln -c Debug

      # State paths (#131): session lifecycle / bundles / heartbeat / join-by-code,
      # asserted against the agent's JSON /status. Low-flake — this is the
      # blocking gate. Excludes the Visual category, which runs non-blocking below.
      - name: Run agent e2e suite (state paths)
        run: dotnet test agent/tests/FocusAgent.IntegrationTests/FocusAgent.IntegrationTests.csproj -c Debug --filter "Category!=Visual" --logger "trx;LogFileName=agent-e2e.trx"

      # Visual enforcement (#133): the overlay + join-toast WinUI surfaces,
      # asserted by screenshot capture (BitBlt + CAPTUREBLT, DPI-aware). These
      # render real DirectComposition surfaces, so they're inherently flakier on a
      # headless runner than the JSON-state suite above. Kept NON-BLOCKING
      # (continue-on-error) and run even if the state suite failed, so we can
      # characterize the flake rate over several runs before promoting it to a
      # blocking gate. The captured PNGs land in TestResults/ and are uploaded
      # below for eyeball triage.
      - name: Run visual enforcement e2e (non-blocking, flake characterization)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: dotnet test agent/tests/FocusAgent.IntegrationTests/FocusAgent.IntegrationTests.csproj -c Debug --filter "Category=Visual" --logger "trx;LogFileName=agent-visual-e2e.trx"

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-e2e-results
          path: agent/tests/FocusAgent.IntegrationTests/TestResults/
          retention-days: 7
